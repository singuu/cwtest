<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
      /* 安全区域设置 */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    
    /* 移除默认的点击高亮 */
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    /* 移除底部导航箭头 */
    ::-webkit-scrollbar {
      display: none;
    }
    
    /* 防止双击缩放 */
    button, input, select {
      touch-action: manipulation;
    }
    
    /* 底部导航栏 - 仅在移动端显示 */
    @media (max-width: 768px) {
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(10, 10, 10, 0.95);
        border-top: 1px solid #1a1a1a;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 8px 0;
        z-index: 100;
        /* 安全区域设置 */
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
      }
      
      .nav-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        color: #888;
        padding: 4px 16px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 10px;
        letter-spacing: 0.5px;
      }
      
      .nav-btn svg {
        width: 18px !important;
        height: 18px !important;
        margin-bottom: 2px !important;
      }
      
      .nav-btn:hover {
        color: #aaa;
      }
      
      .nav-btn.active {
        color: #fff;
      }
      
      .nav-btn span {
        margin-top: 4px;
      }
      
      /* 面板内容 */
      .edit-panel-content {
        width: 100%;
      }
      
      .panel-content {
        display: none;
        animation: fadeIn 0.3s ease-out;
      }
      
      .panel-content.active {
        display: block !important;
      }
    }
    
    /* 桌面端布局 */
    @media (min-width: 769px) {
      .bottom-nav {
        display: none;
      }
      
      .edit-panel-content {
        width: 100%;
      }
      
      .panel-content {
        display: block;
        margin-bottom: 32px;
      }
    }
    
    /* 全局动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .animate-slide-in {
      animation: slideIn 0.4s ease-out forwards;
    }

    /* ═══════════════════════════════════════════════════════
       顶部标题区
    ═══════════════════════════════════════════════════════ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid #1a1a1a;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
      white-space: nowrap;
    }
    h1.logo {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    h1.logo:hover { opacity: 0.7; }
    h1.logo span { display: inline-block; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-btn {
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    #header-upload-btn {
      color: #fff;
      background: #333;
    }
    #header-upload-btn:hover { background: #444; }
    #download-btn-header {
      color: #888;
      background: #1a1a1a;
      border: 1px solid #333;
      cursor: not-allowed;
      opacity: 0.5;
    }
    #download-btn-header:not(:disabled) {
      color: #fff;
      background: #333;
      border-color: #333;
      cursor: pointer;
      opacity: 1;
    }
    #download-btn-header:not(:disabled):hover { background: #444; }

    /* ═══════════════════════════════════════════════════════
       主内容区（左侧展示 + 右侧编辑）
    ═══════════════════════════════════════════════════════ */
    .main-container {
      flex: 1;
      display: flex;
      padding: 32px;
      gap: 40px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* 手机端适配 */
    @media (max-width: 768px) {
      body {
        -webkit-tap-highlight-color: transparent;
        height: 100vh;
        overflow: hidden;
      }
      .header {
        padding: 12px 16px;
        min-height: 60px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .header-left {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        white-space: nowrap;
      }
      .header-left div {
        font-size: 10px;
      }
      h1.logo {
        font-size: 16px;
        letter-spacing: 6px;
        white-space: nowrap;
      }
      .header-right {
        gap: 12px;
      }
      .header-btn {
        padding: 10px 16px;
        font-size: 12px;
        min-width: 80px;
      }
      .header-center {
        display: none;
      }
      .main-container {
        display: flex;
        flex-direction: column;
        padding: 12px 16px 80px;
        height: calc(100vh - 60px);
        overflow: hidden;
      }
      .preview-panel {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
        min-height: 0;
      }
      #preview-canvas-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        border-width: 3px;
        background-color: #222222;
        background-image: 
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
      }
      #preview-wrap {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #canvas-preview {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: 100%;
      }
      .editor-panel {
        max-height: 200px;
        width: 100%;
        overflow-y: scroll;
        padding: 0 16px 20px 16px;
        -webkit-overflow-scrolling: touch;
        position: relative;
        z-index: 1;
      }
      
      /* 颜色面板间距调整 */
      #color-panel {
        padding-bottom: 0;
      }
      
      /* 移动端颜色面板模式标签间距 */
      #color-panel .mode-tabs {
        gap: 12px;
        margin-bottom: 16px;
      }
      
      /* 文字面板间距调整 */
      #text-panel {
        padding-bottom: 0;
      }
      
      /* 比例面板间距调整 */
      #ratio-panel {
        padding-bottom: 0;
      }
      /* 隐藏移动端的标题，因为底部导航栏已经有标签 */
      .section-title {
        display: none;
      }
      /* 但保留比例和布局的标题，因为底部导航栏没有区分 */
      #ratio-panel .section-title {
        display: block;
        font-size: 11px;
        margin-bottom: 8px;
        letter-spacing: 2px;
      }
      .field-label {
        font-size: 11px;
        margin-bottom: 10px;
      }
      .ratio-btn {
        padding: 8px 16px;
        font-size: 12px;
        min-width: 70px;
      }
      .palette-swatch, .color-plus-btn {
        width: 40px;
        height: 40px;
      }
      .palette-row {
        gap: 12px;
      }
      .font-btn {
        padding: 10px 18px;
        font-size: 14px;
        min-width: 60px;
      }
      .slider-row input[type=range] {
        height: 8px;
      }
      .slider-row {
        gap: 12px;
      }
      .field-wrap input[type=text] {
        padding: 12px 16px;
        font-size: 16px;
      }
      .noise-toggle {
        font-size: 14px;
        gap: 12px;
      }
      .noise-toggle input[type=checkbox] {
        width: 44px;
        height: 24px;
      }
      .noise-toggle input[type=checkbox]::after {
        width: 16px;
        height: 16px;
      }
      .noise-toggle input[type=checkbox]:checked::after {
        left: 22px;
      }
      .mode-tab {
        padding: 10px 20px;
        font-size: 13px;
      }
      .split-handle {
        height: 32px;
      }
      .split-handle::before {
        width: 50px;
        height: 6px;
      }
      #drag-hint {
        font-size: 12px;
        padding: 8px 12px;
      }
    }

    /* 左侧展示区 */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    #preview-canvas-container {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 3/4;
      border: 2px dashed #333;
      background-color: #222222;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.2s;
    }
    #preview-canvas-container:hover { border-color: #444; }
    #preview-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      position: absolute;
      top: 0;
      left: 0;
    }
    #preview-placeholder .icon { font-size: 44px; line-height: 1; }
    #preview-placeholder p { color: #777; font-size: 14px; letter-spacing: 1px; }
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background: rgba(18,18,18,0.95);
    }
    #loading.visible { display: flex; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { 
      color: #fff; 
      font-size: 14px; 
      letter-spacing: 1px;
      font-weight: 300;
    }
    #loading-subtext {
      color: #888;
      font-size: 11px;
      letter-spacing: 0.5px;
      margin-top: -8px;
    }
    .loading-progress {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #69db7c, #4dabf7);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    #preview-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }
    #canvas-preview {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }
    #canvas-preview.pick-mode { cursor: crosshair; }
    #canvas-preview.photo-dragging { cursor: grabbing; }
    .photo-drag-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      z-index: 5;
    }
    .photo-drag-hint.visible { opacity: 1; }
    
    /* 文字输入提示 */
    .text-input-hint {
      position: absolute;
      font-size: 14px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 5;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .text-input-hint.visible {
      opacity: 1;
    }
    .split-handle {
      position: absolute;
      left: 0;
      right: 0;
      height: 24px;
      z-index: 10;
      cursor: ns-resize;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .split-handle::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.35);
      transition: background 0.15s, transform 0.15s;
    }
    .split-handle::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 0;
      border-top: 2px dashed rgba(255,255,255,0.25);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .split-handle.vertical::before {
      width: 4px;
      height: 40px;
    }
    .split-handle.vertical::after {
      left: 50%;
      right: auto;
      top: 0;
      bottom: 0;
      transform: translateX(-50%);
      border-top: none;
      border-left: 2px dashed rgba(255,255,255,0.25);
    }
    .split-handle:hover::after,
    #preview-wrap.dragging .split-handle::after {
      opacity: 1;
    }
    .split-handle.at-center::after {
      border-top-color: rgba(100, 200, 255, 0.8);
    }
    .split-handle.vertical.at-center::after {
      border-left-color: rgba(100, 200, 255, 0.8);
    }
    .split-handle:hover::before {
      background: rgba(255,255,255,0.6);
      transform: scaleX(1.3);
    }
    .split-handle.vertical:hover::before {
      transform: scaleY(1.3);
    }
    #preview-wrap.dragging .split-handle::before {
      background: rgba(255,255,255,0.8);
      transform: scaleX(1.5);
    }
    #preview-wrap.dragging .split-handle.vertical::before {
      transform: scaleY(1.5);
    }

    /* 右侧编辑区 */
    .editor-panel {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .section-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 12px;
    }

    /* 画幅比例 */
    .ratio-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .ratio-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #666;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ratio-btn:hover { border-color: #555; color: #bbb; }
    .ratio-btn.active {
      border-color: #888;
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    /* 背景模式 */
    .mode-tabs {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }
    .mode-tab {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      color: #555;
      background: rgba(255,255,255,0.03);
      border: 1px solid #2e2e2e;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-tab:hover { color: #888; border-color: #444; }
    .mode-tab.active {
      color: #fff;
      background: rgba(255,255,255,0.1);
      border-color: #555;
    }

    /* 颜色选择 */
    .color-picker-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-display {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #444;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .color-display:hover { border-color: #666; }
    .color-plus-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2.5px dashed #555;
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      color: #666;
    }
    .color-plus-btn:hover {
      border-color: #888;
      background: rgba(255,255,255,0.08);
      color: #aaa;
    }
    .color-plus-btn.active {
      border-color: #fff;
      border-style: solid;
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    /* 主题色板 */
    .palette-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .palette-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .palette-swatch:hover { transform: scale(1.1); }
    .palette-swatch.selected { border-color: #fff; transform: scale(1.15); }

    /* Gradient swatch - vertical gradient that fills the circle */
    .gradient-swatch {
      background: linear-gradient(180deg, var(--g-start), var(--g-end)) !important;
      background-size: 150% 150% !important;
      background-position: center !important;
    }

    /* 复古纹理 */
    .noise-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .noise-toggle:hover { color: #bbb; }
    .noise-toggle input[type=checkbox] {
      appearance: none;
      -webkit-appearance: none;
      width: 36px;
      height: 20px;
      border-radius: 20px;
      background: #2a2a2a;
      border: 1.5px solid #3a3a3a;
      position: relative;
      cursor: pointer;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }
    .noise-toggle input[type=checkbox]::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #666;
      top: 50%;
      left: 3px;
      transform: translateY(-50%);
      transition: all 0.25s ease;
    }
    .noise-toggle input[type=checkbox]:checked {
      background: rgba(255,255,255,0.1);
      border-color: #555;
    }
    .noise-toggle input[type=checkbox]:checked::after {
      background: #fff;
      left: 17px;
    }

    /* 字体选择 */
    .font-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .font-btn {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      color: #666;
      background: rgba(255,255,255,0.04);
      border: 1px solid #2e2e2e;
      cursor: pointer;
      transition: all 0.15s;
    }
    .font-btn:hover { color: #aaa; border-color: #444; }
    .font-btn.active {
      color: #fff;
      border-color: #555;
      background: rgba(255,255,255,0.1);
    }
    .font-btn[data-font="handwriting"] {
      font-family: Georgia, 'Times New Roman', serif;
    }
    .font-btn[data-font="typewriter"] {
      font-family: 'Courier New', Courier, monospace;
    }
    .font-btn[data-font="modern"] {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    /* 文字设置 */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-row span:first-child {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      width: 36px;
    }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: #555;
    }
    .slider-row span:last-child {
      font-size: 11px;
      color: #888;
      width: 28px;
      text-align: right;
    }
    .field-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;

// ══════════════════════════════════════════════════════
//  k-means 颜色提取
// ══════════════════════════════════════════════════════
function extractPalette(img, k) {
  k = k || 8;
  var size = 120, c = document.createElement('canvas');
  c.width = c.height = size;
  var ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  var d = ctx.getImageData(0, 0, size, size).data;
  var pixels = [];
  for (var i = 0; i < d.length; i += 4) {
    if (d[i+3] >= 128) pixels.push([d[i], d[i+1], d[i+2]]);
  }
  var centers = [], step = Math.floor(pixels.length / k);
  for (var j = 0; j < k; j++) centers.push(pixels[j * step].slice());
  for (var iter = 0; iter < 12; iter++) {
    var sums = [];
    for (var j = 0; j < k; j++) sums.push([0, 0, 0, 0]);
    for (var pi = 0; pi < pixels.length; pi++) {
      var p = pixels[pi], best = 0, bestD = Infinity;
      for (var ci = 0; ci < k; ci++) {
        var dist = Math.pow(p[0]-centers[ci][0], 2) + Math.pow(p[1]-centers[ci][1], 2) + Math.pow(p[2]-centers[ci][2], 2);
        if (dist < bestD) { bestD = dist; best = ci; }
      }
      sums[best][0] += p[0]; sums[best][1] += p[1]; sums[best][2] += p[2]; sums[best][3]++;
    }
    for (var ci = 0; ci < k; ci++) {
      centers[ci] = sums[ci][3] ? [sums[ci][0]/sums[ci][3], sums[ci][1]/sums[ci][3], sums[ci][2]/sums[ci][3]] : centers[ci];
    }
  }
  return centers.map(function(rgb) {
    var mx = Math.max(rgb[0], rgb[1], rgb[2]), mn = Math.min(rgb[0], rgb[1], rgb[2]);
    return { r: Math.round(rgb[0]), g: Math.round(rgb[1]), b: Math.round(rgb[2]), sat: mx ? (mx-mn)/mx : 0 };
  }).sort(function(a, b) { return b.sat - a.sat; });
}

// Build gradient pairs (3 gradients: 1+3, 2+4, 3+5)
function buildGradientPairs() {
  if (!palette || palette.length < 2) return [];
  var p = palette.slice(0, 5);
  var pairs = [];
  // 3 gradient combinations: 1+3, 2+4, 3+5
  var idxPairs = [[0, 2], [1, 3], [2, 4]];
  idxPairs.forEach(function(ip) {
    var a = p[ip[0]], b = p[Math.min(ip[1], p.length - 1)];
    if (a && b) {
      pairs.push({ start: {r: a.r, g: a.g, b: a.b}, end: {r: b.r, g: b.g, b: b.b} });
    }
  });
  return pairs;
}

// Handle file upload
async function handleFile(file) {
  try {
    loadingEl.style.display = 'flex';
    placeholder.style.display = 'none';

    var lt = document.getElementById('loading-text');
    var ls = document.getElementById('loading-subtext');
    var loadingBar = document.querySelector('.loading-bar');
    
    function setLoadingText(t) { if (lt) lt.textContent = t; }
    function setLoadingSubtext(t) { if (ls) ls.textContent = t; }
    function updateProgress(percent) {
      if (loadingBar) {
        loadingBar.style.width = percent + '%';
      }
    }

    // 初始化进度
    updateProgress(0);
    setLoadingText('加载图片...');
    setLoadingSubtext('正在读取图片文件');
    
    // 加载图片
    var url = URL.createObjectURL(file);
    imgEl = new Image();
    await new Promise(function(res, rej) { imgEl.onload = res; imgEl.onerror = rej; imgEl.src = url; });
    updateProgress(30);

    // 提取颜色
    setLoadingText('提取颜色...');
    setLoadingSubtext('分析图片色彩信息');
    // 优化：减少颜色提取的计算量，提高速度
    palette = extractPalette(imgEl, 6); // 减少聚类数量
    updateProgress(60);

    // 渲染调色板
    setLoadingText('生成效果...');
    setLoadingSubtext('创建个性化调色板');
    document._savedGradients = [];
    renderBgPalette();
    updateProgress(75);

    photoOffsetX = 0;
    photoOffsetY = 0;
    photoScale = 1;
    var scaleSlider = document.getElementById('photo-scale-slider');
    var scaleVal = document.getElementById('photo-scale-val');
    if (scaleSlider) scaleSlider.value = 1;
    if (scaleVal) scaleVal.textContent = '100%';

    // 并行处理 EXIF 数据，不阻塞主线程
    setLoadingText('优化效果...');
    setLoadingSubtext('提取位置和时间信息');
    
    // 等待 exifr 库加载完成（最多 5 秒）
    try {
      await Promise.race([
        exifrLoadedPromise,
        new Promise((_, reject) => setTimeout(() => reject(new Error('exifr 加载超时')), 5000))
      ]);
    } catch(e) {
      console.log('等待 exifr 加载失败:', e);
    }
    
    // 处理 EXIF 数据
    if (window.exifr) {
      try {
        console.log('开始解析 EXIF 数据');
        // 添加超时处理，避免地理编码请求过慢
        const exifPromise = window.exifr.parse(file, { gps: true, tiff: true });
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('EXIF 处理超时')), 5000));
        
        try {
          var exif = await Promise.race([exifPromise, timeoutPromise]);
          console.log('EXIF 解析结果:', exif);
          
          if (exif) {
            var dt = exif.DateTimeOriginal || exif.DateTime || exif.CreateDate;
            console.log('时间信息:', { DateTimeOriginal: exif.DateTimeOriginal, DateTime: exif.DateTime, CreateDate: exif.CreateDate });
            
            var locStr = '';
            var timeStr = '';
            
            if (dt) {
              var dd = dt instanceof Date ? dt : new Date(dt);
              if (!isNaN(dd)) {
                var hh = dd.getHours();
                var mm = String(dd.getMinutes()).padStart(2, '0');
                var ap = hh >= 12 ? 'pm' : 'am';
                var h12 = hh % 12 || 12;
                timeStr = h12 + ':' + mm + ' ' + ap;
              }
            }
            
            if (exif.latitude && exif.longitude) {
              console.log('GPS 坐标:', exif.latitude, exif.longitude);
              try {
                // 增加地理编码超时时间
                const geoPromise = fetch(
                  'https://nominatim.openstreetmap.org/reverse?lat=' + exif.latitude + '&lon=' + exif.longitude + '&format=json',
                  { headers: { 'Accept-Language': 'en' } }
                );
                const geoTimeout = new Promise((_, reject) => setTimeout(() => reject(new Error('地理编码超时')), 8000));
                
                try {
                  console.log('开始地理编码请求...');
                  var r = await Promise.race([geoPromise, geoTimeout]);
                  console.log('地理编码请求成功，状态码:', r.status);
                  var g = await r.json();
                  console.log('地理编码结果:', g);
                  var addr = g.address || {};
                  var country = addr.country || '';
                  var city = '';
                  
                  if (country === 'China' || country === '中国') {
                    city = addr.state || addr.province || addr.city || '';
                  } else {
                    city = addr.city || addr.town || addr.village || addr.county || addr.state || 
                           addr.district || addr.suburb || '';
                  }
                  
                  if (city && country) {
                    if (country === 'China' || country === '中国') {
                      locStr = city;
                    } else {
                      locStr = city + ', ' + country;
                    }
                  } else {
                    locStr = city || country || '';
                  }
                  console.log('最终位置:', locStr);
                } catch(geoErr) {
                  console.log('地理编码请求超时，跳过位置信息:', geoErr);
                  // 备用方案：直接使用经纬度作为位置
                  locStr = exif.latitude.toFixed(4) + ', ' + exif.longitude.toFixed(4);
                  console.log('使用经纬度作为备用位置:', locStr);
                }
              } catch(e) {
                console.log('Location fetch error:', e);
                // 备用方案：直接使用经纬度作为位置
                locStr = exif.latitude.toFixed(4) + ', ' + exif.longitude.toFixed(4);
                console.log('使用经纬度作为备用位置:', locStr);
              }
            }
            
            extractedLocation = locStr;
            extractedTime = timeStr;
            
            var hasLocation = !!locStr;
            var hasTime = !!timeStr;
            document.getElementById('show-location-toggle').checked = hasLocation;
            document.getElementById('show-time-toggle').checked = hasTime;
            showLocation = hasLocation;
            showTime = hasTime;
            
            if (!hasLocation && !hasTime) {
              showCustom = true;
              document.getElementById('show-custom-toggle').checked = true;
              document.getElementById('caption-input').value = 'Location, Time';
              document.getElementById('caption-input').style.display = 'block';
            } else {
              showCustom = false;
              document.getElementById('show-custom-toggle').checked = false;
              document.getElementById('caption-input').value = '';
              document.getElementById('caption-input').style.display = 'none';
            }
          }
        } catch(timeoutErr) {
          console.log('EXIF 处理超时，跳过位置和时间信息:', timeoutErr);
        }
      } catch(exifErr) {
        console.log('EXIF 解析错误:', exifErr);
      }
    }
    
    updateProgress(90);

    // 启用下载按钮
    downloadHeaderBtn.disabled = false;

    // 完成加载
    setLoadingText('准备就绪...');
    setLoadingSubtext('即将展示您的作品');
    updateProgress(100);
    
    // 短暂延迟，让用户看到完成状态
    await new Promise(r => setTimeout(r, 300));

    loadingEl.style.display = 'none';
    previewWrap.style.display = 'flex';
    
    // 控制分割线的显示/隐藏
    var splitHandle = document.getElementById('split-handle');
    if (splitHandle) {
      var isDesktop = window.innerWidth >= 769;
      if (isDesktop && imgEl) {
        // 桌面端：只要有图片就显示分割线
        splitHandle.style.display = 'flex';
      } else {
        // 移动端：只在布局面板时显示
        var activePanel = document.querySelector('.panel-content.active');
        if (activePanel && activePanel.id === 'ratio-panel' && imgEl) {
          splitHandle.style.display = 'flex';
        } else {
          splitHandle.style.display = 'none';
        }
      }
    }

    drawCanvas();
  } catch(err) {
    console.error('handleFile error:', err);
    loadingEl.style.display = 'none';
    placeholder.style.display = '';
    previewWrap.style.display = 'none';
    
    // 隐藏分割线
    var splitHandle = document.getElementById('split-handle');
    if (splitHandle) {
      splitHandle.style.display = 'none';
    }
    
    document.getElementById('loading-text').textContent = '处理失败，请重试';
  }
}

// Render background palette (5 theme colors + saved colors, or 5 gradients + 1 plus button)
function renderBgPalette() {
  var row = document.getElementById('bg-palette-row');
  if (!row) return;
  row.innerHTML = '';

  if (colorMode === 'solid') {
    // Theme colors + user saved colors (up to 5 total)
    var themeColors = palette.slice(0, 5);
    var savedColors = document._savedColors || [];
    var allColors = themeColors.concat(savedColors);
    var displayCount = Math.min(5, allColors.length);
    
    for (var i = 0; i < displayCount; i++) {
      (function(colorIndex, color) {
        var swatch = document.createElement('div');
        swatch.className = 'palette-swatch';
        swatch.style.background = 'rgb(' + color.r + ',' + color.g + ',' + color.b + ')';
        swatch.onclick = function() {
          colorMode = 'solid';
          selectedBg = color;
          selectedGradient = null;
          selectedGradientIdx = -1;
          console.log('Selected solid color:', color);
          console.log('Before drawCanvas - selectedBg:', selectedBg);
          drawCanvas();
          console.log('After drawCanvas - selectedBg:', selectedBg);
          // 更新选择状态
          var swatches = row.querySelectorAll('.palette-swatch');
          swatches.forEach(function(s, i) {
            s.classList.toggle('selected', i === colorIndex);
          });
        };
        row.appendChild(swatch);
      })(i, allColors[i]);
    }
  } else {
    // Auto-generated gradients + user saved gradients
    var autoGradients = buildGradientPairs();
    var savedGradients = document._savedGradients || [];
    var allGradients = autoGradients.concat(savedGradients);
    // Show up to 5 gradients total
    var displayCount = Math.min(5, allGradients.length);
    for (var i = 0; i < displayCount; i++) {
      (function(gradientIndex, gradient) {
        var swatch = document.createElement('div');
        swatch.className = 'palette-swatch gradient-swatch';
        // Use CSS custom properties for gradient colors
        swatch.style.setProperty('--g-start', 'rgb(' + gradient.start.r + ',' + gradient.start.g + ',' + gradient.start.b + ')');
        swatch.style.setProperty('--g-end', 'rgb(' + gradient.end.r + ',' + gradient.end.g + ',' + gradient.end.b + ')');
        swatch.onclick = function() {
          colorMode = 'gradient';
          selectedGradient = gradient;
          selectedGradientIdx = gradientIndex;
          selectedBg = null;
          console.log('Selected gradient:', gradient);
          console.log('Before drawCanvas - selectedGradient:', selectedGradient);
          drawCanvas();
          console.log('After drawCanvas - selectedGradient:', selectedGradient);
          // 更新选择状态
          var swatches = row.querySelectorAll('.gradient-swatch');
          swatches.forEach(function(s, i) {
            s.classList.toggle('selected', i === gradientIndex);
          });
        };
        row.appendChild(swatch);
      })(i, allGradients[i]);
    }
  }

  // Plus button (6th)
  var plusBtn = document.createElement('button');
  plusBtn.className = 'color-plus-btn';
  plusBtn.id = 'bg-color-picker-btn';
  plusBtn.title = '取色或自定义颜色';
  plusBtn.innerHTML = '<svg viewBox="0 0 20 20" fill="none" style="width: 18px; height: 18px; pointer-events: none;"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
  plusBtn.addEventListener('click', function() {
    showColorPopover('bg');
  });
  row.appendChild(plusBtn);
}

// Select background color from all colors (theme + saved)
function selectBgFromAll(idx) {
  var themeColors = palette.slice(0, 5);
  var savedColors = document._savedColors || [];
  var allColors = themeColors.concat(savedColors);
  
  if (idx >= 0 && idx < allColors.length) {

// Draw the canvas
function drawCanvas() {
  if (!imgEl) return;
  
  var container = document.getElementById('preview-canvas-container');
  var canvas = document.getElementById('canvas-preview');
  if (!container || !canvas) return;
  
  var containerWidth = container.offsetWidth;
  var containerHeight = container.offsetHeight;
  var canvasWidth = containerWidth;
  var canvasHeight = containerHeight;
  
  canvas.width = canvasWidth;
  canvas.height = canvasHeight;
  
  var ctx = canvas.getContext('2d');
  if (!ctx) return;
  
  // Clear canvas
  ctx.clearRect(0, 0, canvasWidth, canvasHeight);
  
  // Calculate photo area based on ratio
  var photoAreaHeight, photoAreaWidth, photoAreaX, photoAreaY;
  
  if (currentLayout === 'bottom' || currentLayout === 'top') {
    // 垂直布局
    photoAreaHeight = Math.floor(canvasHeight * photoRatio);
    photoAreaWidth = canvasWidth;
    photoAreaX = 0;
    photoAreaY = (currentLayout === 'bottom') ? (canvasHeight - photoAreaHeight) : 0;
  } else {
    // 水平布局
    photoAreaWidth = Math.floor(canvasWidth * photoRatio);
    photoAreaHeight = canvasHeight;
    photoAreaX = (currentLayout === 'right') ? (canvasWidth - photoAreaWidth) : 0;
    photoAreaY = 0;
  }
  
  // Draw background
  if (colorMode === 'solid') {
    if (selectedBg) {
      ctx.fillStyle = 'rgb(' + selectedBg.r + ',' + selectedBg.g + ',' + selectedBg.b + ')';
    } else {
      ctx.fillStyle = '#121212';
    }
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  } else if (colorMode === 'gradient' && selectedGradient) {
    var gradient = ctx.createLinearGradient(0, 0, 0, canvasHeight);
    gradient.addColorStop(0, 'rgb(' + selectedGradient.start.r + ',' + selectedGradient.start.g + ',' + selectedGradient.start.b + ')');
    gradient.addColorStop(1, 'rgb(' + selectedGradient.end.r + ',' + selectedGradient.end.g + ',' + selectedGradient.end.b + ')');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvasWidth, canvasHeight);
  }
  
  // Apply noise if enabled
  if (noiseEnabled) {
    applyNoise(ctx, canvasWidth, canvasHeight);
  }
  
  // Draw photo
  var imgWidth = imgEl.width;
  var imgHeight = imgEl.height;
  var imgRatio = imgWidth / imgHeight;
  var photoAreaRatio = photoAreaWidth / photoAreaHeight;
  
  var drawWidth, drawHeight, drawX, drawY;
  
  if (imgRatio > photoAreaRatio) {
    // Image is wider than photo area
    drawHeight = photoAreaHeight;
    drawWidth = drawHeight * imgRatio;
  } else {
    // Image is taller than photo area
    drawWidth = photoAreaWidth;
    drawHeight = drawWidth / imgRatio;
  }
  
  // Apply scale
  drawWidth *= photoScale;
  drawHeight *= photoScale;
  
  // Calculate position with offset
  drawX = photoAreaX + (photoAreaWidth - drawWidth) / 2 + photoOffsetX;
  drawY = photoAreaY + (photoAreaHeight - drawHeight) / 2 + photoOffsetY;
  
  ctx.drawImage(imgEl, drawX, drawY, drawWidth, drawHeight);
  
  // Draw text
  if (showCustom) {
    var customText = document.getElementById('caption-input').value || '';
    drawText(ctx, customText, canvasWidth, canvasHeight);
  } else {
    var textToDraw = '';
    if (showLocation && extractedLocation) {
      textToDraw += extractedLocation;
    }
    if (showTime && extractedTime) {
      if (textToDraw) textToDraw += '\n';
      textToDraw += extractedTime;
    }
    drawText(ctx, textToDraw, canvasWidth, canvasHeight);
  }
  
  // 更新文字输入提示的显示
  updateTextInputHint();
}

// Apply noise texture
function applyNoise(ctx, width, height) {
  var imageData = ctx.getImageData(0, 0, width, height);
  var data = imageData.data;
  
  for (var i = 0; i < data.length; i += 4) {
    var noise = Math.random() * 10 - 5;
    data[i] += noise;
    data[i + 1] += noise;
    data[i + 2] += noise;
  }
  
  ctx.putImageData(imageData, 0, 0);
}

// Draw text on canvas
function drawText(ctx, text, width, height) {
  if (!text) return;
  
  var lines = text.split('\n');
  var fontSize = 36 * userFontScale;
  var lineHeight = fontSize * 1.2;
  var totalTextHeight = lineHeight * lines.length;
  var startY = (height - totalTextHeight) / 2;
  
  ctx.font = fontSize + 'px ' + getFontFamily();
  ctx.fillStyle = selectedTextColor;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.letterSpacing = userLetterSpacing + 'px';
  
  lines.forEach(function(line, index) {
    var y = startY + index * lineHeight;
    ctx.fillText(line, width / 2, y);
  });
}

// Get font family based on selected font style
function getFontFamily() {
  switch (fontStyle) {
    case 'handwriting':
      return 'Georgia, "Times New Roman", serif';
    case 'typewriter':
      return '"Courier New", Courier, monospace';
    case 'modern':
      return '-apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif';
    default:
      return '-apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif';
  }
}

// Update text input hint visibility
function updateTextInputHint() {
  var hint = document.getElementById('text-input-hint');
  if (!hint) return;
  
  if (showCustom && !document.getElementById('caption-input').value) {
    hint.classList.add('visible');
  } else {
    hint.classList.remove('visible');
  }
}
