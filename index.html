<!DOCTYPE html>

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>ColorWalk</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
      /* 安全区域设置 */
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    
    /* 移除默认的点击高亮 */
    * {
      -webkit-tap-highlight-color: transparent;
    }
    
    /* 移除底部导航箭头 */
    ::-webkit-scrollbar {
      display: none;
    }
    
    /* 优化触摸操作 */
    .editor-panel {
      touch-action: pan-y;
    }
    
    /* 防止双击缩放 */
    button, input, select {
      touch-action: manipulation;
    }
    
    /* 底部导航栏 - 仅在移动端显示 */
    @media (max-width: 768px) {
      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(10, 10, 10, 0.95);
        border-top: 1px solid #1a1a1a;
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 8px 0;
        z-index: 100;
        /* 安全区域设置 */
        padding-bottom: calc(8px + env(safe-area-inset-bottom));
      }
      
      .nav-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: none;
        border: none;
        color: #888;
        padding: 4px 16px;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 10px;
        letter-spacing: 0.5px;
      }
      
      .nav-btn svg {
        width: 18px !important;
        height: 18px !important;
        margin-bottom: 2px !important;
      }
      
      .nav-btn:hover {
        color: #aaa;
      }
      
      .nav-btn.active {
        color: #fff;
      }
      
      .nav-btn span {
        margin-top: 4px;
      }
      
      /* 面板内容 */
      .edit-panel-content {
        width: 100%;
      }
      
      .panel-content {
        display: none;
        animation: fadeIn 0.3s ease-out;
      }
      
      .panel-content.active {
        display: block !important;
      }
    }
    
    /* 桌面端布局 */
    @media (min-width: 769px) {
      .bottom-nav {
        display: none;
      }
      
      .edit-panel-content {
        width: 100%;
      }
      
      .panel-content {
        display: block;
        margin-bottom: 32px;
      }
    }
    
    /* 全局动画 */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }
    
    .animate-slide-in {
      animation: slideIn 0.4s ease-out forwards;
    }

    /* ═══════════════════════════════════════════════════════
       顶部标题区
    ═══════════════════════════════════════════════════════ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid #1a1a1a;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
      white-space: nowrap;
    }
    h1.logo {
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    h1.logo:hover { opacity: 0.7; }
    h1.logo span { display: inline-block; }
    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-btn {
      font-size: 12px;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }
    #header-upload-btn {
      color: #fff;
      background: #333;
    }
    #header-upload-btn:hover { background: #444; }
    #download-btn-header {
      color: #888;
      background: #1a1a1a;
      border: 1px solid #333;
      cursor: not-allowed;
      opacity: 0.5;
    }
    #download-btn-header:not(:disabled) {
      color: #fff;
      background: #333;
      border-color: #333;
      cursor: pointer;
      opacity: 1;
    }
    #download-btn-header:not(:disabled):hover { background: #444; }

    /* ═══════════════════════════════════════════════════════
       主内容区（左侧展示 + 右侧编辑）
    ═══════════════════════════════════════════════════════ */
    .main-container {
      flex: 1;
      display: flex;
      padding: 32px;
      gap: 40px;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
    }

    /* 手机端适配 */
    @media (max-width: 768px) {
      body {
        -webkit-tap-highlight-color: transparent;
        height: 100vh;
        overflow: hidden;
      }
      .header {
        padding: 12px 16px;
        min-height: 60px;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .header-left {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
        white-space: nowrap;
      }
      .header-left div {
        font-size: 10px;
      }
      h1.logo {
        font-size: 16px;
        letter-spacing: 6px;
        white-space: nowrap;
      }
      .header-right {
        gap: 12px;
      }
      .header-btn {
        padding: 10px 16px;
        font-size: 12px;
        min-width: 80px;
      }
      .header-center {
        display: none;
      }
      .main-container {
        display: flex;
        flex-direction: column;
        padding: 12px 16px 80px;
        height: calc(100vh - 60px);
        overflow: hidden;
      }
      .preview-panel {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 8px;
        min-height: 0;
      }
      #preview-canvas-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        border-width: 3px;
        background-color: #222222;
        background-image: 
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 20px 20px;
      }
      #preview-wrap {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #canvas-preview {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: 100%;
      }
      .editor-panel {
        max-height: 200px;
        width: 100%;
        overflow-y: auto;
        padding: 0 16px 20px 16px;
        -webkit-overflow-scrolling: touch;
        touch-action: pan-y;
        -webkit-user-select: none;
        user-select: none;
        position: relative;
        z-index: 1;
      }
      
      /* 颜色面板间距调整 */
      #color-panel {
        padding-bottom: 0;
      }
      
      /* 文字面板间距调整 */
      #text-panel {
        padding-bottom: 0;
      }
      
      /* 比例面板间距调整 */
      #ratio-panel {
        padding-bottom: 0;
      }
      /* 隐藏移动端的标题，因为底部导航栏已经有标签 */
      .section-title {
        display: none;
      }
      /* 但保留比例和布局的标题，因为底部导航栏没有区分 */
      #ratio-panel .section-title {
        display: block;
        font-size: 11px;
        margin-bottom: 8px;
        letter-spacing: 2px;
      }
      .field-label {
        font-size: 11px;
        margin-bottom: 10px;
      }
      .ratio-btn {
        padding: 8px 16px;
        font-size: 12px;
        min-width: 70px;
      }
      .palette-swatch, .color-plus-btn {
        width: 40px;
        height: 40px;
      }
      .palette-row {
        gap: 12px;
      }
      .font-btn {
        padding: 10px 18px;
        font-size: 14px;
        min-width: 60px;
      }
      .slider-row input[type=range] {
        height: 8px;
      }
      .slider-row {
        gap: 12px;
      }
      .field-wrap input[type=text] {
        padding: 12px 16px;
        font-size: 16px;
      }
      .noise-toggle {
        font-size: 14px;
        gap: 12px;
      }
      .noise-toggle input[type=checkbox] {
        width: 44px;
        height: 24px;
      }
      .noise-toggle input[type=checkbox]::after {
        width: 16px;
        height: 16px;
      }
      .noise-toggle input[type=checkbox]:checked::after {
        left: 22px;
      }
      .mode-tab {
        padding: 10px 20px;
        font-size: 13px;
      }
      .split-handle {
        height: 32px;
      }
      .split-handle::before {
        width: 50px;
        height: 6px;
      }
      #drag-hint {
        font-size: 12px;
        padding: 8px 12px;
      }
    }

    /* 左侧展示区 */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    #preview-canvas-container {
      width: 100%;
      max-width: 480px;
      aspect-ratio: 3/4;
      border: 2px dashed #333;
      background-color: #222222;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.2s;
    }
    #preview-canvas-container:hover { border-color: #444; }
    #preview-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      position: absolute;
      top: 0;
      left: 0;
    }
    #preview-placeholder .icon { font-size: 44px; line-height: 1; }
    #preview-placeholder p { color: #777; font-size: 14px; letter-spacing: 1px; }
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      background: rgba(18,18,18,0.95);
    }
    #loading.visible { display: flex; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { 
      color: #fff; 
      font-size: 14px; 
      letter-spacing: 1px;
      font-weight: 300;
    }
    #loading-subtext {
      color: #888;
      font-size: 11px;
      letter-spacing: 0.5px;
      margin-top: -8px;
    }
    .loading-progress {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #69db7c, #4dabf7);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    #preview-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }
    #canvas-preview {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
    }
    #canvas-preview.pick-mode { cursor: crosshair; }
    #canvas-preview.photo-dragging { cursor: grabbing; }
    .photo-drag-hint {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      z-index: 5;
    }
    .photo-drag-hint.visible { opacity: 1; }
    .split-handle {
      position: absolute;
      left: 0;
      right: 0;
      height: 24px;
      z-index: 10;
      cursor: ns-resize;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .split-handle::before {
      content: '';
      display: block;
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.35);
      transition: background 0.15s, transform 0.15s;
    }
    .split-handle::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 0;
      border-top: 2px dashed rgba(255,255,255,0.25);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s, border-color 0.2s;
    }
    .split-handle.vertical::before {
      width: 4px;
      height: 40px;
    }
    .split-handle.vertical::after {
      left: 50%;
      right: auto;
      top: 0;
      bottom: 0;
      transform: translateX(-50%);
      border-top: none;
      border-left: 2px dashed rgba(255,255,255,0.25);
    }
    .split-handle:hover::after,
    #preview-wrap.dragging .split-handle::after {
      opacity: 1;
    }
    .split-handle.at-center::after {
      border-top-color: rgba(100, 200, 255, 0.8);
    }
    .split-handle.vertical.at-center::after {
      border-left-color: rgba(100, 200, 255, 0.8);
    }
    .split-handle:hover::before {
      background: rgba(255,255,255,0.6);
      transform: scaleX(1.3);
    }
    .split-handle.vertical:hover::before {
      transform: scaleY(1.3);
    }
    #preview-wrap.dragging .split-handle::before {
      background: rgba(255,255,255,0.8);
      transform: scaleX(1.5);
    }
    #preview-wrap.dragging .split-handle.vertical::before {
      transform: scaleY(1.5);
    }

    /* 右侧编辑区 */
    .editor-panel {
      width: 380px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }
    .section-title {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 12px;
    }

    /* 画幅比例 */
    .ratio-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .ratio-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      color: #666;
      font-size: 12px;
      padding: 6px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .ratio-btn:hover { border-color: #555; color: #bbb; }
    .ratio-btn.active {
      border-color: #888;
      color: #fff;
      background: rgba(255,255,255,0.1);
    }

    /* 背景模式 */
    .mode-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .mode-tab {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      color: #555;
      background: rgba(255,255,255,0.03);
      border: 1px solid #2e2e2e;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-tab:hover { color: #888; border-color: #444; }
    .mode-tab.active {
      color: #fff;
      background: rgba(255,255,255,0.1);
      border-color: #555;
    }

    /* 颜色选择 */
    .color-picker-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-display {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #444;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .color-display:hover { border-color: #666; }
    .color-plus-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2.5px dashed #555;
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      color: #666;
    }
    .color-plus-btn:hover {
      border-color: #888;
      background: rgba(255,255,255,0.08);
      color: #aaa;
    }
    .color-plus-btn.active {
      border-color: #fff;
      border-style: solid;
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    /* 主题色板 */
    .palette-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .palette-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      border: 2.5px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .palette-swatch:hover { transform: scale(1.1); }
    .palette-swatch.selected { border-color: #fff; transform: scale(1.15); }

    /* Gradient swatch - vertical gradient that fills the circle */
    .gradient-swatch {
      background: linear-gradient(180deg, var(--g-start), var(--g-end)) !important;
      background-size: 150% 150% !important;
      background-position: center !important;
    }

    /* 复古纹理 */
    .noise-toggle {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      user-select: none;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .noise-toggle:hover { color: #bbb; }
    .noise-toggle input[type=checkbox] {
      appearance: none;
      -webkit-appearance: none;
      width: 36px;
      height: 20px;
      border-radius: 20px;
      background: #2a2a2a;
      border: 1.5px solid #3a3a3a;
      position: relative;
      cursor: pointer;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }
    .noise-toggle input[type=checkbox]::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #666;
      top: 50%;
      left: 3px;
      transform: translateY(-50%);
      transition: all 0.25s ease;
    }
    .noise-toggle input[type=checkbox]:checked {
      background: rgba(255,255,255,0.1);
      border-color: #555;
    }
    .noise-toggle input[type=checkbox]:checked::after {
      background: #fff;
      left: 17px;
    }

    /* 字体选择 */
    .font-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .font-btn {
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 13px;
      color: #666;
      background: rgba(255,255,255,0.04);
      border: 1px solid #2e2e2e;
      cursor: pointer;
      transition: all 0.15s;
    }
    .font-btn:hover { color: #aaa; border-color: #444; }
    .font-btn.active {
      color: #fff;
      border-color: #555;
      background: rgba(255,255,255,0.1);
    }
    .font-btn[data-font="handwriting"] {
      font-family: Georgia, 'Times New Roman', serif;
    }
    .font-btn[data-font="typewriter"] {
      font-family: 'Courier New', Courier, monospace;
    }
    .font-btn[data-font="modern"] {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    /* 文字设置 */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .slider-row span:first-child {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      width: 36px;
    }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: #555;
    }
    .slider-row span:last-child {
      font-size: 11px;
      color: #888;
      width: 28px;
      text-align: right;
    }
    .field-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .field-label {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #444;
    }
    .field-wrap input[type=text] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 10px 14px;
      color: #ddd;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .field-wrap input[type=text]:focus { border-color: #555; }

    /* ═══════════════════════════════════════════════════════
       底部信息区
    ═══════════════════════════════════════════════════════ */
    .footer {
      padding: 16px;
      text-align: center;
      font-size: 11px;

// ══════════════════════════════════════════════════════
//  k-means 颜色提取
// ══════════════════════════════════════════════════════
function extractPalette(img, k) {
  k = k || 8;
  var size = 120, c = document.createElement('canvas');
  c.width = c.height = size;
  var ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  var d = ctx.getImageData(0, 0, size, size).data;
  var pixels = [];
  for (var i = 0; i < d.length; i += 4) {
    if (d[i+3] >= 128) pixels.push([d[i], d[i+1], d[i+2]]);
  }
  var centers = [], step = Math.floor(pixels.length / k);
  for (var j = 0; j < k; j++) centers.push(pixels[j * step].slice());
  for (var iter = 0; iter < 12; iter++) {
    var sums = [];
    for (var j = 0; j < k; j++) sums.push([0, 0, 0, 0]);
    for (var pi = 0; pi < pixels.length; pi++) {
      var p = pixels[pi], best = 0, bestD = Infinity;
      for (var ci = 0; ci < k; ci++) {
        var dist = Math.pow(p[0]-centers[ci][0], 2) + Math.pow(p[1]-centers[ci][1], 2) + Math.pow(p[2]-centers[ci][2], 2);
        if (dist < bestD) { bestD = dist; best = ci; }
      }
      sums[best][0] += p[0]; sums[best][1] += p[1]; sums[best][2] += p[2]; sums[best][3]++;
    }
    for (var ci = 0; ci < k; ci++) {
      centers[ci] = sums[ci][3] ? [sums[ci][0]/sums[ci][3], sums[ci][1]/sums[ci][3], sums[ci][2]/sums[ci][3]] : centers[ci];
    }
  }
  return centers.map(function(rgb) {
    var mx = Math.max(rgb[0], rgb[1], rgb[2]), mn = Math.min(rgb[0], rgb[1], rgb[2]);
    return { r: Math.round(rgb[0]), g: Math.round(rgb[1]), b: Math.round(rgb[2]), sat: mx ? (mx-mn)/mx : 0 };
  }).sort(function(a, b) { return b.sat - a.sat; });
}

// Build gradient pairs (3 gradients: 1+3, 2+4, 3+5)
function buildGradientPairs() {
  if (!palette || palette.length < 2) return [];
  var p = palette.slice(0, 5);
  var pairs = [];
  // 3 gradient combinations: 1+3, 2+4, 3+5
  var idxPairs = [[0, 2], [1, 3], [2, 4]];
  idxPairs.forEach(function(ip) {
    var a = p[ip[0]], b = p[Math.min(ip[1], p.length - 1)];
    if (a && b) {
      pairs.push({ start: {r: a.r, g: a.g, b: a.b}, end: {r: b.r, g: b.g, b: b.b} });
    }
  });
  return pairs;
}

    var loadingBar = document.querySelector('.loading-bar');
    
    function setLoadingText(t) { if (lt) lt.textContent = t; }
    function setLoadingSubtext(t) { if (ls) ls.textContent = t; }
    function updateProgress(percent) {
      if (loadingBar) {
        loadingBar.style.width = percent + '%';
      }
    }

    // 初始化进度
    updateProgress(0);
    setLoadingText('加载图片...');
    setLoadingSubtext('正在读取图片文件');
    
    // 加载图片
    var url = URL.createObjectURL(file);
    imgEl = new Image();
    await new Promise(function(res, rej) { imgEl.onload = res; imgEl.onerror = rej; imgEl.src = url; });
    updateProgress(30);

    // 提取颜色
    setLoadingText('提取颜色...');
    setLoadingSubtext('分析图片色彩信息');
    // 优化：减少颜色提取的计算量，提高速度
    palette = extractPalette(imgEl, 6); // 减少聚类数量
    updateProgress(60);

    // 渲染调色板
    setLoadingText('生成效果...');
    setLoadingSubtext('创建个性化调色板');
    document._savedGradients = [];
    renderBgPalette();
    selectBg(0);
    updateProgress(75);

    photoOffsetX = 0;
    photoOffsetY = 0;
    photoScale = 1;
    var scaleSlider = document.getElementById('photo-scale-slider');
    var scaleVal = document.getElementById('photo-scale-val');
    if (scaleSlider) scaleSlider.value = 1;
    if (scaleVal) scaleVal.textContent = '100%';

    // 并行处理 EXIF 数据，不阻塞主线程
    setLoadingText('优化效果...');
    setLoadingSubtext('提取位置和时间信息');
    
    // 优化：不等待 exifr 加载完成，直接处理
    if (window.exifr) {
      try {
        // 添加超时处理，避免地理编码请求过慢
        const exifPromise = window.exifr.parse(file, { gps: true, tiff: true });
        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error('EXIF 处理超时')), 3000));
        
        try {
          var exif = await Promise.race([exifPromise, timeoutPromise]);
          if (exif) {
            var dt = exif.DateTimeOriginal || exif.DateTime || exif.CreateDate;
            var locStr = '';
            var timeStr = '';
            
            if (dt) {
              var dd = dt instanceof Date ? dt : new Date(dt);
              if (!isNaN(dd)) {
                var hh = dd.getHours();
                var mm = String(dd.getMinutes()).padStart(2, '0');
                var ap = hh >= 12 ? 'pm' : 'am';
                var h12 = hh % 12 || 12;
                timeStr = h12 + ':' + mm + ' ' + ap;
              }
            }
            
            if (exif.latitude && exif.longitude) {
              try {
                // 添加地理编码超时处理
                const geoPromise = fetch(
                  'https://nominatim.openstreetmap.org/reverse?lat=' + exif.latitude + '&lon=' + exif.longitude + '&format=json',
                  { headers: { 'Accept-Language': 'en' }, timeout: 2000 }
                );
                const geoTimeout = new Promise((_, reject) => setTimeout(() => reject(new Error('地理编码超时')), 2000));
                
                try {
                  var r = await Promise.race([geoPromise, geoTimeout]);
                  var g = await r.json();
                  var addr = g.address || {};
                  var country = addr.country || '';
                  var city = '';
                  
                  if (country === 'China' || country === '中国') {
                    city = addr.state || addr.province || addr.city || '';
                  } else {
                    city = addr.city || addr.town || addr.village || addr.county || addr.state || 
                           addr.district || addr.suburb || '';
                  }
                  
                  if (city && country) {
                    if (country === 'China' || country === '中国') {
                      locStr = city;
                    } else {
                      locStr = city + ', ' + country;
                    }
                  } else {
                    locStr = city || country || '';
                  }
                } catch(geoErr) {
                  console.log('地理编码请求超时，跳过位置信息');
                }
              } catch(e) {
                console.log('Location fetch error:', e);
              }
            }
            
            extractedLocation = locStr;
            extractedTime = timeStr;
            
            var hasLocation = !!locStr;
            var hasTime = !!timeStr;
            document.getElementById('show-location-toggle').checked = hasLocation;
            document.getElementById('show-time-toggle').checked = hasTime;
            showLocation = hasLocation;
            showTime = hasTime;
            
            if (!hasLocation && !hasTime) {
              showCustom = true;
              document.getElementById('show-custom-toggle').checked = true;
              document.getElementById('caption-input').value = 'Location, Time';
              document.getElementById('caption-input').style.display = 'block';
            } else {
              showCustom = false;
              document.getElementById('show-custom-toggle').checked = false;
              document.getElementById('caption-input').value = '';
              document.getElementById('caption-input').style.display = 'none';
            }
          }
        } catch(timeoutErr) {
          console.log('EXIF 处理超时，跳过位置和时间信息');
        }
      } catch(exifErr) {
        console.log('EXIF 解析错误:', exifErr);
      }
    }
    
    updateProgress(90);

    // 启用下载按钮
    downloadHeaderBtn.disabled = false;

    // 完成加载
    setLoadingText('准备就绪...');
    setLoadingSubtext('即将展示您的作品');
    updateProgress(100);
    
    // 短暂延迟，让用户看到完成状态
    await new Promise(r => setTimeout(r, 300));

    loadingEl.style.display = 'none';
    previewWrap.style.display = 'flex';
    
    // 控制分割线的显示/隐藏，只在布局模块显示
    var splitHandle = document.getElementById('split-handle');
    if (splitHandle) {
      var activePanel = document.querySelector('.panel-content.active');
      if (activePanel && activePanel.id === 'ratio-panel') {
        splitHandle.style.display = 'flex';
      } else {
        splitHandle.style.display = 'none';
      }
    }

    drawCanvas();
  } catch(err) {
    console.error('handleFile error:', err);
    loadingEl.style.display = 'none';
    placeholder.style.display = '';
    previewWrap.style.display = 'none';
    
    // 隐藏分割线
    var splitHandle = document.getElementById('split-handle');
    if (splitHandle) {
      splitHandle.style.display = 'none';
    }
    
    document.getElementById('loading-text').textContent = '处理失败，请重试';
  }
}

// Render background palette (5 theme colors + saved colors, or 5 gradients + 1 plus button)
function renderBgPalette() {
  var row = document.getElementById('bg-palette-row');
  if (!row) return;
  row.innerHTML = '';

  if (colorMode === 'solid') {
    // Theme colors + user saved colors (up to 5 total)
    var themeColors = palette.slice(0, 5);
    var savedColors = document._savedColors || [];
    var allColors = themeColors.concat(savedColors);
    var displayCount = Math.min(5, allColors.length);
    
    for (var i = 0; i < displayCount; i++) {
      var c = allColors[i];
      var swatch = document.createElement('div');
      swatch.className = 'palette-swatch';
      swatch.style.background = 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')';
      swatch.dataset.index = i;
      swatch.addEventListener('click', function(e) {
        var idx = parseInt(e.target.dataset.index);
        selectBgFromAll(idx);
        updatePaletteSelection(idx);
      });
      row.appendChild(swatch);
    }
  } else {
    // Auto-generated gradients + user saved gradients
    var autoGradients = buildGradientPairs();
    var savedGradients = document._savedGradients || [];
    var allGradients = autoGradients.concat(savedGradients);
    // Show up to 5 gradients total
    var displayCount = Math.min(5, allGradients.length);
    for (var i = 0; i < displayCount; i++) {
      var g = allGradients[i];
      var swatch = document.createElement('div');
      swatch.className = 'palette-swatch gradient-swatch';
      // Use CSS custom properties for gradient colors
      swatch.style.setProperty('--g-start', 'rgb(' + g.start.r + ',' + g.start.g + ',' + g.start.b + ')');
      swatch.style.setProperty('--g-end', 'rgb(' + g.end.r + ',' + g.end.g + ',' + g.end.b + ')');
      swatch.dataset.index = i;
      swatch.addEventListener('click', function(e) {
        var idx = parseInt(e.target.dataset.index);
        selectGradient(allGradients[idx], idx);
        updateGradientSelection(idx);
      });
      row.appendChild(swatch);
    }
  }

  // Plus button (6th)
  var plusBtn = document.createElement('button');
  plusBtn.className = 'color-plus-btn';
  plusBtn.id = 'bg-color-picker-btn';
  plusBtn.title = '取色或自定义颜色';
  plusBtn.innerHTML = '<svg viewBox="0 0 20 20" fill="none" style="width: 18px; height: 18px; pointer-events: none;"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
  plusBtn.addEventListener('click', function() {
    showColorPopover('bg');
  });
  row.appendChild(plusBtn);
}

// Update palette selection UI
function updatePaletteSelection(selectedIdx) {
  var row = document.getElementById('bg-palette-row');
  if (!row) return;
  var swatches = row.querySelectorAll('.palette-swatch');
  swatches.forEach(function(s, i) {
    s.classList.toggle('selected', i === selectedIdx);
  });
}

// Update gradient selection UI
function updateGradientSelection(selectedIdx) {
  var row = document.getElementById('bg-palette-row');
  if (!row) return;
  var swatches = row.querySelectorAll('.gradient-swatch');
  swatches.forEach(function(s, i) {
    s.classList.toggle('selected', i === selectedIdx);
  });
}

// Select background color from theme palette
function selectBg(i) {
  colorMode = 'solid';
  selectedBg = palette[i];
  selectedGradient = null;
  selectedGradientIdx = -1;
  exitPickMode();
  drawCanvas();
  updatePaletteSelection(i);
}

// Select background color from all colors (theme + saved)
function selectBgFromAll(idx) {
  var themeColors = palette.slice(0, 5);
  var savedColors = document._savedColors || [];
  var allColors = themeColors.concat(savedColors);
  
  if (idx >= 0 && idx < allColors.length) {
    colorMode = 'solid';
    selectedBg = allColors[idx];
    selectedGradient = null;
    selectedGradientIdx = -1;
    exitPickMode();
    drawCanvas();
    updatePaletteSelection(idx);
  }
}

function selectGradient(g, idx) {
  colorMode = 'gradient';
  selectedGradient = g;
  selectedGradientIdx = idx;
  selectedBg = null;
  exitPickMode();
  drawCanvas();
  // Update gradient selection UI
  updateGradientSelection(idx);
}



// Picker mode
function togglePicker() {
  pickMode ? exitPickMode() : enterPickMode();
}

function enterPickMode() {
  if (!imgEl) return;
  pickMode = true;
  canvas.classList.add('pick-mode');
  showPickHint(colorMode === 'gradient' ? '🎨 第 1/2 次：点击图片取渐变起始色' : '🎨 点击图片取色');
  canvas.addEventListener('click', onCanvasPick, { once: true });
}

function exitPickMode() {
  pickMode = false;
  gradientPickState = null;
  canvas.classList.remove('pick-mode');
  hidePickHint();
  canvas.removeEventListener('click', onCanvasPick);
}

function showPickHint(text) {
  var h = document.getElementById('pick-hint');
  if (!h) {
    h = document.createElement('div');
    h.id = 'pick-hint';
    h.className = 'pick-hint';
    document.body.appendChild(h);
  }
  h.textContent = text;
  h.classList.add('visible');
  var rect = canvas.getBoundingClientRect();
  h.style.left = (rect.left + rect.width / 2) + 'px';
  h.style.top = (rect.top + 20) + 'px';
}

function hidePickHint() {
  var h = document.getElementById('pick-hint');
  if (h) h.classList.remove('visible');
}

function onCanvasPick(e) {
  if (!pickMode) return;
  var rect = canvas.getBoundingClientRect();
  var sx = canvas.width / rect.width;
  var sy = canvas.height / rect.height;
  var x = Math.round((e.clientX - rect.left) * sx);
  var y = Math.round((e.clientY - rect.top) * sy);
  var ctx = canvas.getContext('2d');
  var tr = 0, tg = 0, tb = 0, cnt = 0;
  for (var dx = -1; dx <= 1; dx++) {
    for (var dy = -1; dy <= 1; dy++) {
      var px = x + dx, py = y + dy;
      if (px < 0 || px >= canvas.width || py < 0 || py >= canvas.height) continue;
      var dd = ctx.getImageData(px, py, 1, 1).data;
      tr += dd[0]; tg += dd[1]; tb += dd[2]; cnt++;
    }
  }
  if (cnt > 0) { tr = Math.round(tr / cnt); tg = Math.round(tg / cnt); tb = Math.round(tb / cnt); }
  var pc = { r: tr, g: tg, b: tb };

  if (colorMode === 'gradient') {
    if (!gradientPickState) {
      // First pick - start color
      gradientPickState = { start: pc };
      showPickHint('🎨 第 2/2 次：点击图片取渐变结束色');
      canvas.addEventListener('click', onCanvasPick, { once: true });
      return;
    } else {
      // Second pick - end color, create gradient
      var g = { start: gradientPickState.start, end: pc };
      if (!document._savedGradients) document._savedGradients = [];
      document._savedGradients.push(g);
      // Re-render palette to show new gradient
      renderBgPalette();
      // Select the newly added gradient (it will be at the end)
      var newIdx = document._savedGradients.length - 1;
      selectGradient(g, newIdx + buildGradientPairs().length);
      exitPickMode();
      return;
    }
  }

  exitPickMode();
  palette.push(pc);
  selectedBg = pc;
  renderBgPalette();
  drawCanvas();
  updatePaletteSelection(palette.length - 1);
}

// Draw canvas
function drawCanvas() {
  if (!imgEl || (colorMode === 'solid' && !selectedBg) || (colorMode === 'gradient' && !selectedGradient)) return;
  var rat = ratioMap[currentRatio];
  var W = 1080, H = Math.round(W / rat);
  canvas.width = W;
  canvas.height = H;
  var ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  // Photo area (calculate first to know background size)
  var photoSize, photoX, photoY, bgSize, bgX, bgY;
  
  if (currentLayout === 'bottom' || currentLayout === 'top') {
    // 上下布局
    photoSize = Math.round(H * photoRatio); // 使用photoRatio
    photoY = currentLayout === 'bottom' ? H - photoSize : 0;
    photoX = 0;
    bgSize = H - photoSize;
    bgY = currentLayout === 'bottom' ? 0 : photoSize;
    bgX = 0;
  } else {
    // 左右布局
    photoSize = Math.round(W * photoRatio); // 使用photoRatio
    photoX = currentLayout === 'right' ? W - photoSize : 0;
    photoY = 0;
    bgSize = W - photoSize;
    bgX = currentLayout === 'right' ? 0 : photoSize;
    bgY = 0;
  }

  // Background
  if (colorMode === 'gradient' && selectedGradient) {
    var grad;
    if (currentLayout === 'bottom' || currentLayout === 'top') {
      // 上下布局 - 垂直渐变
      if (currentLayout === 'bottom') {
        grad = ctx.createLinearGradient(0, bgY, 0, bgY + bgSize);
      } else {
        grad = ctx.createLinearGradient(0, bgY, 0, bgY + bgSize);
      }
    } else {
      // 左右布局 - 水平渐变
      if (currentLayout === 'left') {
        grad = ctx.createLinearGradient(bgX, 0, bgX + bgSize, 0);
      } else {
        grad = ctx.createLinearGradient(bgX, 0, bgX + bgSize, 0);
      }
    }
    var s = selectedGradient.start, e = selectedGradient.end;
    // More color stops for smoother, more natural gradient
    grad.addColorStop(0, 'rgb(' + s.r + ',' + s.g + ',' + s.b + ')');
    grad.addColorStop(0.25, 'rgb(' + Math.round(s.r * 0.75 + e.r * 0.25) + ',' + Math.round(s.g * 0.75 + e.g * 0.25) + ',' + Math.round(s.b * 0.75 + e.b * 0.25) + ')');
    grad.addColorStop(0.5, 'rgb(' + Math.round((s.r + e.r) / 2) + ',' + Math.round((s.g + e.g) / 2) + ',' + Math.round((s.b + e.b) / 2) + ')');
    grad.addColorStop(0.75, 'rgb(' + Math.round(s.r * 0.25 + e.r * 0.75) + ',' + Math.round(s.g * 0.25 + e.g * 0.75) + ',' + Math.round(s.b * 0.25 + e.b * 0.75) + ')');
    grad.addColorStop(1, 'rgb(' + e.r + ',' + e.g + ',' + e.b + ')');
    ctx.fillStyle = grad;
    if (currentLayout === 'bottom' || currentLayout === 'top') {
      // 上下布局
      ctx.fillRect(bgX, bgY, W, bgSize);
    } else {
      // 左右布局
      ctx.fillRect(bgX, bgY, bgSize, H);
    }
  } else if (selectedBg) {
    ctx.fillStyle = 'rgb(' + selectedBg.r + ',' + selectedBg.g + ',' + selectedBg.b + ')';
    if (currentLayout === 'bottom' || currentLayout === 'top') {
      // 上下布局
      ctx.fillRect(bgX, bgY, W, bgSize);
    } else {
      // 左右布局
      ctx.fillRect(bgX, bgY, bgSize, H);
    }
  }

  // Cover-crop with offsets and scale
  var ir = imgEl.naturalWidth / imgEl.naturalHeight;
  var tr;
  var photoW, photoH;
  
  if (currentLayout === 'bottom' || currentLayout === 'top') {
    // 上下布局
    photoW = W;
    photoH = photoSize;
    tr = photoW / photoH;
  } else {
    // 左右布局
    photoW = photoSize;
    photoH = H;
    tr = photoW / photoH;
  }
  
  // 先填充整个照片区域的背景色
  if (colorMode === 'gradient' && selectedGradient) {
    var grad;
    if (currentLayout === 'bottom' || currentLayout === 'top') {
      grad = ctx.createLinearGradient(photoX, photoY, photoX, photoY + photoH);
    } else {
      grad = ctx.createLinearGradient(photoX, photoY, photoX + photoW, photoY);
    }
    var s = selectedGradient.start, e = selectedGradient.end;
    grad.addColorStop(0, 'rgb(' + s.r + ',' + s.g + ',' + s.b + ')');
    grad.addColorStop(0.25, 'rgb(' + Math.round(s.r * 0.75 + e.r * 0.25) + ',' + Math.round(s.g * 0.75 + e.g * 0.25) + ',' + Math.round(s.b * 0.75 + e.b * 0.25) + ')');
    grad.addColorStop(0.5, 'rgb(' + Math.round((s.r + e.r) / 2) + ',' + Math.round((s.g + e.g) / 2) + ',' + Math.round((s.b + e.b) / 2) + ')');
    grad.addColorStop(0.75, 'rgb(' + Math.round(s.r * 0.25 + e.r * 0.75) + ',' + Math.round(s.g * 0.25 + e.g * 0.75) + ',' + Math.round(s.b * 0.25 + e.b * 0.75) + ')');
    grad.addColorStop(1, 'rgb(' + e.r + ',' + e.g + ',' + e.b + ')');
    ctx.fillStyle = grad;
  } else if (selectedBg) {
    ctx.fillStyle = 'rgb(' + selectedBg.r + ',' + selectedBg.g + ',' + selectedBg.b + ')';
  }
  ctx.fillRect(photoX, photoY, photoW, photoH);
  
  // 计算缩放和裁剪（只允许放大）
  var sw, sh, sx, sy, dw, dh, dx, dy;
  
  // 只处理放大或100%的情况
  if (ir > tr) {
    sh = imgEl.naturalHeight / photoScale;
    sw = sh * tr;
  } else {
    sw = imgEl.naturalWidth / photoScale;
    sh = sw / tr;
  }
  
  // 裁剪起始位置
  sx = (imgEl.naturalWidth - sw) / 2;
  sy = (imgEl.naturalHeight - sh) / 2;
  
  // 应用偏移
  var maxX = imgEl.naturalWidth - sw;
  var maxY = imgEl.naturalHeight - sh;
  if (maxX > 0) { sx += maxX * photoOffsetX * 0.5; sx = Math.max(0, Math.min(maxX, sx)); }
  if (maxY > 0) { sy += maxY * photoOffsetY * 0.5; sy = Math.max(0, Math.min(maxY, sy)); }
  
  // 绘制尺寸填满整个区域
  dw = photoW;
  dh = photoH;
  dx = photoX;
  dy = photoY;
  
  // 绘制图片
  ctx.drawImage(imgEl, sx, sy, sw, sh, dx, dy, dw, dh);

  // Text - build caption from location, time, and custom input based on switches
  var customCaption = showCustom ? document.getElementById('caption-input').value.trim() : '';
  var parts = [];
  if (showLocation && extractedLocation) parts.push(extractedLocation);
  if (showTime && extractedTime) parts.push(extractedTime);
  if (customCaption) parts.push(customCaption);
  
  var caption = parts.join(', ');
  
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  var baseTextHW = (fontStyle === 'handwriting' ? W * 0.039 : W * 0.036) * userFontScale;
  var textX, textY;
  
  if (currentLayout === 'bottom' || currentLayout === 'top') {
    // 上下布局
    textX = W / 2;
    textY = currentLayout === 'bottom' ? bgY + bgSize / 2 : bgY + bgSize / 2;
  } else {
    // 左右布局
    textX = bgX + bgSize / 2;
    textY = H / 2;
  }

  if (caption) {
    ctx.fillStyle = selectedTextColor;
    ctx.letterSpacing = userLetterSpacing + 'px';
    if (fontStyle === 'handwriting') {
      ctx.font = '300 ' + Math.round(baseTextHW) + "px Georgia,'Times New Roman','STSong',serif";
      ctx.fillText(caption, textX, textY);
    } else if (fontStyle === 'modern') {
      ctx.font = '500 ' + Math.round(baseTextHW) + "px -apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif";
      ctx.fillText(caption, textX, textY);
    } else {
      ctx.font = '400 ' + Math.round(baseTextHW) + "px 'Courier New',Courier,Consolas,monospace";
      ctx.fillText(caption, textX, textY);
    }
  } else {
    // Show placeholder when no content
    var a = 0.22;
    var inv = selectedBg && (selectedBg.r + selectedBg.g + selectedBg.b) > 380 ? 'rgba(0,0,0,' + a + ')' : 'rgba(255,255,255,' + a + ')';
    ctx.fillStyle = inv;
    ctx.letterSpacing = userLetterSpacing + 'px';
    var ph, fm;
    if (fontStyle === 'handwriting') {
      ph = '300 ';
      fm = "Georgia,'Times New Roman','STSong',serif";
    } else if (fontStyle === 'modern') {
      ph = '500 ';
      fm = "-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif";
    } else {
      ph = '400 ';
      fm = "'Courier New',Courier,Consolas,monospace";
    }
    ctx.font = ph + Math.round(baseTextHW) + 'px ' + fm;
    ctx.fillText('Location, Time', textX, textY);
  }

  // Retro noise overlay - only apply to background area
  if (noiseEnabled) {
    if (currentLayout === 'bottom' || currentLayout === 'top') {
      // 上下布局 - 背景区域
      var bgHeight = bgSize;
      if (bgHeight > 0) {
        var imgData = ctx.getImageData(bgX, bgY, W, bgHeight), d = imgData.data;
        for (var ni = 0; ni < d.length; ni += 4) {
          var n = Math.random() * 18 - 9;
          d[ni] = Math.min(255, Math.max(0, d[ni] + n));
          d[ni + 1] = Math.min(255, Math.max(0, d[ni + 1] + n));
          d[ni + 2] = Math.min(255, Math.max(0, d[ni + 2] + n));
        }
        ctx.putImageData(imgData, bgX, bgY);
      }
    } else {
      // 左右布局 - 背景区域
      var bgWidth = bgSize;
      if (bgWidth > 0) {
        var imgData = ctx.getImageData(bgX, bgY, bgWidth, H), d = imgData.data;
        for (var ni = 0; ni < d.length; ni += 4) {
          var n = Math.random() * 18 - 9;
          d[ni] = Math.min(255, Math.max(0, d[ni] + n));
          d[ni + 1] = Math.min(255, Math.max(0, d[ni + 1] + n));
          d[ni + 2] = Math.min(255, Math.max(0, d[ni + 2] + n));
        }
        ctx.putImageData(imgData, bgX, bgY);
      }
    }
  }
}

// Drag: photo position + split handle
(function() {
  var wrap = document.getElementById('preview-wrap');
  var handle = document.getElementById('split-handle');
  var hint = document.getElementById('drag-hint');
  var splitD = false, photoD = false, lx = 0, ly = 0;

  canvas.addEventListener('mouseenter', function() {
    hint.classList.add('visible');
    setTimeout(function() { hint.classList.remove('visible'); }, 2500);
  });

  function posHandle() {
    if (!canvas.width) return;
    var rect = canvas.getBoundingClientRect();
    var r = rect.height / canvas.height;
    
    if (currentLayout === 'bottom' || currentLayout === 'top') {
      // 上下布局 - 垂直分割线
      var ph = canvas.height * photoRatio;
      var py = canvas.height - ph;
      handle.style.top = (py * r - 12) + 'px';
      handle.style.left = '0';
      handle.style.width = '100%';
      handle.style.height = '24px';
      handle.style.cursor = 'ns-resize';
      // 水平图标
      handle.style.flexDirection = 'row';
      handle.classList.remove('vertical');
    } else {
      // 左右布局 - 水平分割线
      var pw = canvas.width * photoRatio;
      var px;
      if (currentLayout === 'right') {
        // 原图在右，分割线在左侧
        px = canvas.width - pw;
      } else {
        // 原图在左，分割线在右侧
        px = pw;
      }
      var rw = rect.width / canvas.width;
      handle.style.left = (px * rw - 12) + 'px';
      handle.style.top = '0';
      handle.style.width = '24px';
      handle.style.height = '100%';
      handle.style.cursor = 'ew-resize';
      // 垂直图标
      handle.style.flexDirection = 'column';
      handle.classList.add('vertical');
    }
    
    // Check if handle is at center (50%)
    var isCenter = Math.abs(photoRatio - 0.5) < 0.02;
    handle.classList.toggle('at-center', isCenter);
  }

  // Photo drag
  canvas.addEventListener('mousedown', function(e) { e.preventDefault(); photoD = true; canvas.classList.add('photo-dragging'); lx = e.clientX; ly = e.clientY; });
  canvas.addEventListener('touchstart', function(e) { 
    e.preventDefault(); 
    photoD = true; 
    canvas.classList.add('photo-dragging'); 
    lx = e.touches[0].clientX; 
    ly = e.touches[0].clientY; 
    // 添加触摸反馈
    canvas.style.transform = 'scale(0.98)';
    canvas.style.transition = 'transform 0.1s ease';
  }, { passive: false });
  document.addEventListener('mousemove', function(e) {
    if (!photoD) return;
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    photoOffsetX += (e.clientX - lx) / rect.width * 2;
    photoOffsetY += (e.clientY - ly) / rect.height * 2;
    photoOffsetX = Math.max(-1, Math.min(1, photoOffsetX));
    photoOffsetY = Math.max(-1, Math.min(1, photoOffsetY));
    lx = e.clientX; ly = e.clientY;
    drawCanvas();
    posHandle();
  });
  document.addEventListener('touchmove', function(e) {
    if (!photoD) return;
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    var tx = e.touches[0].clientX, ty = e.touches[0].clientY;
    // 优化触摸滑动的平滑度
    var deltaX = (tx - lx) / rect.width * 2;
    var deltaY = (ty - ly) / rect.height * 2;
    // 添加惯性效果
    photoOffsetX += deltaX * 0.8;
    photoOffsetY += deltaY * 0.8;
    photoOffsetX = Math.max(-1, Math.min(1, photoOffsetX));
    photoOffsetY = Math.max(-1, Math.min(1, photoOffsetY));
    lx = tx; ly = ty;
    drawCanvas();
    posHandle();
  }, { passive: false });
  document.addEventListener('mouseup', function() { 
    if (photoD) { 
      photoD = false; 
      canvas.classList.remove('photo-dragging');
      // 重置触摸反馈
      canvas.style.transform = 'scale(1)';
    } 
  });
  document.addEventListener('touchend', function() { 
    if (photoD) { 
      photoD = false; 
      canvas.classList.remove('photo-dragging');
      // 重置触摸反馈
      canvas.style.transform = 'scale(1)';
    } 
  });
  document.addEventListener('mouseup', function() { if (photoD) { photoD = false; canvas.classList.remove('photo-dragging'); } });
  document.addEventListener('touchend', function() { if (photoD) { photoD = false; canvas.classList.remove('photo-dragging'); } });

  // Split handle
  handle.addEventListener('mousedown', function(e) { e.preventDefault(); e.stopPropagation(); splitD = true; wrap.classList.add('dragging'); document.body.style.userSelect = 'none'; });
  handle.addEventListener('touchstart', function(e) { e.preventDefault(); e.stopPropagation(); splitD = true; wrap.classList.add('dragging'); document.body.style.userSelect = 'none'; }, { passive: false });
  document.addEventListener('mousemove', function(e) {
    if (!splitD) return;
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    
    if (currentLayout === 'bottom' || currentLayout === 'top') {
      // 上下布局 - 垂直拖动
      var cy = e.clientY, sy = canvas.height / rect.height;
      var y = (cy - rect.top) * sy;
      photoRatio = Math.max(0.15, Math.min(0.85, (canvas.height - y) / canvas.height));
    } else {
      // 左右布局 - 水平拖动
      var cx = e.clientX, sx = canvas.width / rect.width;
      var x = (cx - rect.left) * sx;
      if (currentLayout === 'right') {
        // 原图在右，比例是右侧部分
        photoRatio = Math.max(0.15, Math.min(0.85, (canvas.width - x) / canvas.width));
      } else {
        // 原图在左，比例是左侧部分
        photoRatio = Math.max(0.15, Math.min(0.85, x / canvas.width));
      }
    }
    
    drawCanvas();
    posHandle();
  });
  document.addEventListener('touchmove', function(e) {
    if (!splitD) return;
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    
    if (currentLayout === 'bottom' || currentLayout === 'top') {
      // 上下布局 - 垂直拖动
      var cy = e.touches[0].clientY, sy = canvas.height / rect.height;
      var y = (cy - rect.top) * sy;
      photoRatio = Math.max(0.15, Math.min(0.85, (canvas.height - y) / canvas.height));
    } else {
      // 左右布局 - 水平拖动
      var cx = e.touches[0].clientX, sx = canvas.width / rect.width;
      var x = (cx - rect.left) * sx;
      if (currentLayout === 'right') {
        // 原图在右，比例是右侧部分
        photoRatio = Math.max(0.15, Math.min(0.85, (canvas.width - x) / canvas.width));
      } else {
        // 原图在左，比例是左侧部分
        photoRatio = Math.max(0.15, Math.min(0.85, x / canvas.width));
      }
    }
    
    drawCanvas();
    posHandle();
  }, { passive: false });
  document.addEventListener('mouseup', function() { if (splitD) { splitD = false; wrap.classList.remove('dragging'); document.body.style.userSelect = ''; } });
  document.addEventListener('touchend', function() { if (splitD) { splitD = false; wrap.classList.remove('dragging'); document.body.style.userSelect = ''; } });

  var od = drawCanvas;
  drawCanvas = function() { od(); requestAnimationFrame(posHandle); };
})();

// Download
function doDownload() {
  // 检测设备类型
  var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
  var isAndroid = /Android/i.test(navigator.userAgent);
  var isWeChat = /MicroMessenger/i.test(navigator.userAgent);
  
  if (isMobile) {
    // 移动端下载逻辑
    canvas.toBlob(function(blob) {
      if (blob) {
        if (isWeChat) {
          // 微信内环境特殊处理
          weChatDownload(blob, isIOS, isAndroid);
        } else if (navigator.share && navigator.canShare) {
          // 优先使用 Web Share API (iOS 12+, Android 6+)
          var file = new File([blob], 'colorwalk_' + Date.now() + '.png', { type: 'image/png' });
          if (navigator.canShare({ files: [file] })) {
            navigator.share({
              title: 'ColorWalk',
              text: 'My ColorWalk creation',
              files: [file]
            }).catch(function(error) {
              console.log('Share failed:', error);
              // 回退到平台特定的下载方法
              if (isIOS) {
                iosDownload(blob);
              } else if (isAndroid) {
                androidDownload(blob);
              } else {
                fallbackDownload(blob);
              }
            });
          } else {
            // canShare 不支持文件，回退到平台特定的下载方法
            if (isIOS) {
              iosDownload(blob);
            } else if (isAndroid) {
              androidDownload(blob);
            } else {
              fallbackDownload(blob);
            }
          }
        } else {
          // 根据平台选择不同的下载方法
          if (isIOS) {
            iosDownload(blob);
          } else if (isAndroid) {
            androidDownload(blob);
          } else {
            fallbackDownload(blob);
          }
        }
      }
    }, 'image/png');
  } else {
    // 桌面端下载逻辑
    var a = document.createElement('a');
    a.download = 'colorwalk_' + Date.now() + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  }
}

function iosDownload(blob) {
  // iOS 设备的下载方法
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'colorwalk_' + Date.now() + '.png';
  // iOS 设备需要特殊处理
  a.style.display = 'none';
  document.body.appendChild(a);
  // 触发点击事件
  var event = document.createEvent('MouseEvents');
  event.initMouseEvent('click', true, true, window, 1, 0, 0, 0, 0, false, false, false, false, 0, null);
  a.dispatchEvent(event);
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function androidDownload(blob) {
  // Android 设备的下载方法
  var url = URL.createObjectURL(blob);
  
  // 方法1：直接尝试使用浏览器下载
  var a = document.createElement('a');
  a.href = url;
  a.download = 'colorwalk_' + Date.now() + '.png';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  
  // 方法2：如果方法1失败，尝试在新窗口打开
  setTimeout(function() {
    try {
      var win = window.open(url, '_blank');
      if (!win) {
        // 如果新窗口被阻止，尝试使用 location.href
        window.location.href = url;
      }
    } catch(e) {
      console.log('Android download fallback failed:', e);
    }
  }, 100);
  
  // 清理 URL
  setTimeout(function() {
    URL.revokeObjectURL(url);
  }, 10000);
}

    // 创建图片容器

      if (e.target === overlay) {
        document.body.removeChild(overlay);
        URL.revokeObjectURL(url);
      }
    });
  };

  function setGradientTarget(target) {
    gradientPickerState.activeTarget = target;
    updateGradientUI();
  }

  function updateGradientUI() {
    var startEl = document.getElementById('cp-gradient-start');
    var endEl = document.getElementById('cp-gradient-end');
    var previewEl = document.getElementById('cp-gradient-preview');
    var confirmBtn = document.getElementById('cp-confirm-gradient');
    var colorInput = document.getElementById('cp-color-input');
    
    if (!startEl || !endEl) return;
    
    // 更新选中状态
    startEl.classList.toggle('active', gradientPickerState.activeTarget === 'start');
    endEl.classList.toggle('active', gradientPickerState.activeTarget === 'end');
    
    // 更新颜色显示
    if (gradientPickerState.start) {
      startEl.querySelector('.color-circle').style.background = 
        'rgb(' + gradientPickerState.start.r + ',' + gradientPickerState.start.g + ',' + gradientPickerState.start.b + ')';
    }
    if (gradientPickerState.end) {
      endEl.querySelector('.color-circle').style.background = 
        'rgb(' + gradientPickerState.end.r + ',' + gradientPickerState.end.g + ',' + gradientPickerState.end.b + ')';
    }
    
    // 更新预览
    if (gradientPickerState.start && gradientPickerState.end) {
      var s = gradientPickerState.start, e = gradientPickerState.end;
      previewEl.style.background = 'linear-gradient(180deg, rgb(' + s.r + ',' + s.g + ',' + s.b + '), rgb(' + e.r + ',' + e.g + ',' + e.b + '))';

    } else if (gradientPickerState.start) {
      var s = gradientPickerState.start;
      previewEl.style.background = 'rgb(' + s.r + ',' + s.g + ',' + s.b + ')';
    }
    
    // 同步颜色输入框
    var activeColor = gradientPickerState.activeTarget === 'start' 
      ? gradientPickerState.start 
      : gradientPickerState.end;
    if (activeColor && colorInput) {
      colorInput.value = rgbToHex(activeColor.r, activeColor.g, activeColor.b);
    }
  }

  function onColorInput(hex) {
    var c = hexToRgb(hex);
    if (colorMode === 'gradient' && currentTarget === 'bg') {
      gradientPickerState[gradientPickerState.activeTarget] = c;
      updateGradientUI();
    } else {
      applyColorFromHex(hex);
      var preview = document.getElementById('cp-preview');
      if (preview) preview.style.background = hex;
    }
  }

  function confirmGradient() {
    if (!gradientPickerState.start || !gradientPickerState.end) return;
    
    var g = { 
      start: gradientPickerState.start, 
      end: gradientPickerState.end 
    };
    
    if (!document._savedGradients) document._savedGradients = [];
    document._savedGradients.push(g);
    
    // 重置状态
    gradientPickerState = { start: null, end: null, activeTarget: 'start' };
    
    // 重新渲染并选中新渐变
    renderBgPalette();
    var newIdx = document._savedGradients.length - 1;
    selectGradient(g, newIdx + buildGradientPairs().length);
    
    hidePopover();
  }

  function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map(function(v) { var h = v.toString(16); return h.length === 1 ? '0' + h : h; }).join('');
  }
  function hexToRgb(h) {
    h = h.replace('#', '');
    return { r: parseInt(h.substr(0, 2), 16), g: parseInt(h.substr(2, 2), 16), b: parseInt(h.substr(4, 2), 16) };
  }

  function applyColorFromHex(hex) {
    var c = hexToRgb(hex);
    if (currentTarget === 'bg') {
      colorMode = 'solid';
      selectedBg = c;
      selectedGradient = null;
      selectedGradientIdx = -1;
      // Add to palette and re-render
      palette.push(c);
      renderBgPalette();
      updatePaletteSelection(palette.length - 1);
      exitPickMode();
      drawCanvas();
    } else {
      selectedTextColor = 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',0.9)';
      drawCanvas();
    }
  }

  function onPopoverCanvasPick(e) {
    document.getElementById('cp-pick-from-canvas').classList.remove('active');
    var ctx = canvas.getContext('2d');
    var rect = canvas.getBoundingClientRect();
    var sx = (e.clientX - rect.left) / rect.width * canvas.width;
    var sy = (e.clientY - rect.top) / rect.height * canvas.height;
    var d = ctx.getImageData(Math.round(sx) - 1, Math.round(sy) - 1, 3, 3).data;
    var tr = 0, tg = 0, tb = 0, n = 0;
    for (var i = 0; i < d.length; i += 4) { if (d[i + 3] >= 128) { tr += d[i]; tg += d[i + 1]; tb += d[i + 2]; n++; } }
    if (n > 0) { tr = Math.round(tr / n); tg = Math.round(tg / n); tb = Math.round(tb / n); }
    var hex = rgbToHex(tr, tg, tb);
    
    if (colorMode === 'gradient' && currentTarget === 'bg') {
      gradientPickerState[gradientPickerState.activeTarget] = { r: tr, g: tg, b: tb };
      // 自动切换到下一个
      if (gradientPickerState.activeTarget === 'start' && !gradientPickerState.end) {
        gradientPickerState.activeTarget = 'end';
      }
      showPopover('bg');
    } else {
      applyColorFromHex(hex);
    }
    
    var colorInput = document.getElementById('cp-color-input');
    if (colorInput) colorInput.value = hex;
    
    var preview = document.getElementById('cp-preview');
    if (preview) preview.style.background = hex;
    
    hidePickHint();
  }

  function showPopover(target) {
    createPopover();
    currentTarget = target;
    renderPopoverContent();
    
    var triggerBtn = target === 'bg' ? document.getElementById('bg-color-picker-btn') : textBtn;
    if (!triggerBtn) return;
    var r = triggerBtn.getBoundingClientRect();
    popover.classList.add('visible');

    if (target === 'bg' && selectedBg && colorMode !== 'gradient') {
      var c = selectedBg;
      var hex = rgbToHex(c.r, c.g, c.b);
      var colorInput = document.getElementById('cp-color-input');
      if (colorInput) colorInput.value = hex;
      var preview = document.getElementById('cp-preview');
      if (preview) preview.style.background = hex;
    } else if (target === 'text') {
      var tc = selectedTextColor.match(/[\d.]+/g);
      if (tc && tc.length >= 3) {
        var hex = rgbToHex(Math.round(tc[0]), Math.round(tc[1]), Math.round(tc[2]));
        var colorInput = document.getElementById('cp-color-input');
        if (colorInput) colorInput.value = hex;
        var preview = document.getElementById('cp-preview');
        if (preview) preview.style.background = hex || selectedTextColor;
      } else {
        var preview = document.getElementById('cp-preview');
        if (preview) preview.style.background = selectedTextColor;
        var colorInput = document.getElementById('cp-color-input');
        if (colorInput) colorInput.value = '#ffffff';
      }
    }

    renderPresets();

    popover.style.left = Math.max(8, r.left - 10) + 'px';
    popover.style.top = (r.bottom + 8) + 'px';
    setTimeout(function() {
      var pr = popover.getBoundingClientRect();
      if (pr.right > window.innerWidth - 8) {
        popover.style.left = (window.innerWidth - pr.width - 8) + 'px';
      }
    }, 0);

    setTimeout(function() {
      document.addEventListener('mousedown', closeOnOutside);
      document.addEventListener('touchstart', closeOnOutside, { passive: false });
    }, 0);
  }

  function hidePopover() {
    if (popover) popover.classList.remove('visible');
    document.removeEventListener('mousedown', closeOnOutside);
    document.removeEventListener('touchstart', closeOnOutside);
  }

  function closeOnOutside(e) {
    var bgPickerBtn = document.getElementById('bg-color-picker-btn');
    if (popover && !popover.contains(e.target) && e.target !== bgPickerBtn && e.target !== textBtn) {
      hidePopover();
    }
  }

  function renderPresets() {
    var wrap = document.getElementById('cp-presets');
    if (!wrap) return;
    // Hide presets section - colors are already shown in the main panel
    wrap.style.display = 'none';
  }

  textBtn.addEventListener('click', function() { showPopover('text'); });

  // Expose showPopover globally for bg picker
  window.showColorPopover = showPopover;
})();

// Event listeners for controls
document.getElementById('mode-tabs').addEventListener('click', function(e) {
  var tab = e.target.closest('.mode-tab');
  if (!tab) return;
  document.querySelectorAll('.mode-tab').forEach(function(t) { t.classList.remove('active'); });
  tab.classList.add('active');
  colorMode = tab.dataset.mode;
  renderBgPalette();
  if (colorMode === 'solid' && !selectedBg && palette.length > 0) selectBg(0);
  else if (colorMode === 'gradient' && !selectedGradient) {
    var pairs = buildGradientPairs();
    if (pairs.length > 0) selectGradient(pairs[0], 0);
  }
  else drawCanvas();
});

document.getElementById('font-row').addEventListener('click', function(e) {
  var b = e.target.closest('.font-btn');
  if (!b) return;
  document.querySelectorAll('.font-btn').forEach(function(bb) { bb.classList.remove('active'); });
  b.classList.add('active');
  fontStyle = b.dataset.font;
  drawCanvas();
});

// Text color swatches
document.getElementById('text-color-row').addEventListener('click', function(e) {
  var swatch = e.target.closest('.text-color-swatch');
  if (!swatch) return;
  
  // Update UI
  document.querySelectorAll('.text-color-swatch').forEach(function(s) { s.classList.remove('selected'); });
  swatch.classList.add('selected');
  
  // Get color from style
  var colorStyle = swatch.style.background;
  var rgbMatch = colorStyle.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if (rgbMatch) {
    var r = parseInt(rgbMatch[1]), g = parseInt(rgbMatch[2]), b = parseInt(rgbMatch[3]);
    selectedTextColor = 'rgba(' + r + ',' + g + ',' + b + ',0.9)';
    drawCanvas();
  }
});

function updatePreviewAspectRatio() {
  var container = document.getElementById('preview-canvas-container');
  var rat = ratioMap[currentRatio];
  container.style.aspectRatio = rat;
}

document.getElementById('ratio-row').addEventListener('click', function(e) {
  var b = e.target.closest('.ratio-btn');
  if (!b) return;
  document.querySelectorAll('#ratio-row .ratio-btn').forEach(function(r) { r.classList.remove('active'); });
  b.classList.add('active');
  currentRatio = b.dataset.ratio;
  updatePreviewAspectRatio();
  drawCanvas();
});

document.getElementById('layout-row').addEventListener('click', function(e) {
  var b = e.target.closest('.ratio-btn');
  if (!b) return;
  document.querySelectorAll('#layout-row .ratio-btn').forEach(function(r) { r.classList.remove('active'); });
  b.classList.add('active');
  currentLayout = b.dataset.layout;
  // 切换布局时重置比例为 50-50
  photoRatio = 0.5;
  drawCanvas();
});

document.getElementById('noise-toggle').addEventListener('change', function() {
  noiseEnabled = this.checked;
  drawCanvas();
});

document.getElementById('font-size-slider').addEventListener('input', function(e) {
  userFontScale = e.target.value / 36;
  document.getElementById('font-size-val').textContent = e.target.value;
  drawCanvas();
});

document.getElementById('letter-spacing-slider').addEventListener('input', function(e) {
  userLetterSpacing = parseFloat(e.target.value);
  document.getElementById('letter-spacing-val').textContent = e.target.value;
  drawCanvas();
});

document.getElementById('photo-scale-slider').addEventListener('input', function(e) {
  photoScale = parseFloat(e.target.value);
  document.getElementById('photo-scale-val').textContent = Math.round(photoScale * 100) + '%';
  drawCanvas();
});

document.getElementById('caption-input').addEventListener('input', drawCanvas);
 
 // Location and time toggle switches
document.getElementById('show-location-toggle').addEventListener('change', function() {
  showLocation = this.checked;
  // If both location and time are off, enable custom
  if (!showLocation && !showTime) {
    showCustom = true;
    document.getElementById('show-custom-toggle').checked = true;
    document.getElementById('caption-input').style.display = 'block';
    if (!document.getElementById('caption-input').value) {
      document.getElementById('caption-input').value = 'Location, Time';
    }
  }
  drawCanvas();
});

document.getElementById('show-time-toggle').addEventListener('change', function() {
  showTime = this.checked;
  // If both location and time are off, enable custom
  if (!showLocation && !showTime) {
    showCustom = true;
    document.getElementById('show-custom-toggle').checked = true;
    document.getElementById('caption-input').style.display = 'block';
    if (!document.getElementById('caption-input').value) {
      document.getElementById('caption-input').value = 'Location, Time';
    }
  }
  drawCanvas();
});

// Custom toggle switch
document.getElementById('show-custom-toggle').addEventListener('change', function() {
  showCustom = this.checked;
  var input = document.getElementById('caption-input');
  input.style.display = showCustom ? 'block' : 'none';
  if (showCustom && !input.value) {
    input.value = 'Location, Time';
  }
  drawCanvas();
});
</script>
